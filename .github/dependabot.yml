version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    groups:
      security-updates:
        applies-to: "security-updates"
        patterns: ["*"]
      minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    groups:
      security-updates:
        applies-to: "security-updates"
        patterns: ["*"]
      minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
